<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Certificates - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar {
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            width: 250px;
        }
        .sidebar-brand {
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 10px 20px 30px;
            display: block;
        }
        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left: 4px solid #4cc9f0;
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <span class="sidebar-brand">🎓 CertifyMe</span>
    <a th:href="@{/admin/dashboard}">📊 Dashboard</a>
    <a th:href="@{/admin/certificates}" class="active">📜 All Certificates</a>
    <a th:href="@{/logout}">🚪 Logout</a>
</div>

<div class="main-content">
    <h4 class="fw-bold mb-4">All Certificates</h4>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Certificate ID</th>
                    <th>Recipient</th>
                    <th>Course</th>
                    <th>Enrollment No</th>
                    <th>Issued By</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cert, i : ${certificates}">
                    <td th:text="${i.count}"></td>
                    <td><small th:text="${cert.certificateId}"></small></td>
                    <td th:text="${cert.recipientName}"></td>
                    <td th:text="${cert.courseTitle}"></td>
                    <td th:text="${cert.enrollmentNo}"></td>
                    <td th:text="${cert.issuer.organizationName}"></td>
                    <td>
                            <span th:if="${cert.status.name() == 'ACTIVE'}"
                                  class="badge bg-success">ACTIVE</span>
                        <span th:if="${cert.status.name() == 'REVOKED'}"
                              class="badge bg-danger">REVOKED</span>
                    </td>
                    <td>
                        <form th:if="${cert.status.name() == 'ACTIVE'}"
                              th:action="@{/admin/revoke/{id}(id=${cert.id})}"
                              method="post">
                            <button class="btn btn-sm btn-outline-danger">Revoke</button>
                        </form>
                        <span th:if="${cert.status.name() == 'REVOKED'}"
                              class="text-muted small">Revoked</span>
                    </td>
                </tr>
                <tr th:if="${certificates.empty}">
                    <td colspan="8" class="text-center text-muted py-4">No certificates issued yet</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
