<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Issue Certificate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar {
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            width: 250px;
        }
        .sidebar-brand {
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 10px 20px 30px;
            display: block;
        }
        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left: 4px solid #4cc9f0;
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <span class="sidebar-brand">🎓 CertifyMe</span>
    <a th:href="@{/issuer/dashboard}">📊 Dashboard</a>
    <a th:href="@{/issuer/issue}" class="active">📜 Issue Certificate</a>
    <a th:href="@{/issuer/bulk}">📂 Bulk Upload</a>
    <a th:href="@{/logout}">🚪 Logout</a>
</div>

<div class="main-content">
    <h4 class="fw-bold mb-4">Issue Single Certificate</h4>

    <div class="card border-0 shadow-sm rounded-4" style="max-width: 600px;">
        <div class="card-body p-4">

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/issuer/issue}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Recipient Full Name</label>
                    <input type="text" name="recipientName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Recipient Email</label>
                    <input type="email" name="recipientEmail" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Course / Degree Title</label>
                    <input type="text" name="courseTitle" class="form-control"
                           placeholder="e.g. Master of Computer Applications" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Enrollment Number</label>
                    <input type="text" name="enrollmentNo" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Passing Year</label>
                    <input type="text" name="passingYear" class="form-control"
                           placeholder="e.g. 2024" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Organization Logo</label>
                    <input type="file" name="logoFile" class="form-control" accept="image/*">
                    <small class="text-muted">Upload your logo to appear on the certificate (optional)</small>
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-pill">
                    🎓 Issue Certificate
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
