<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify Certificate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .verify-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .valid-badge {
            background: #d4edda;
            border: 2px solid #28a745;
            border-radius: 10px;
            padding: 20px;
        }
        .invalid-badge {
            background: #f8d7da;
            border: 2px solid #dc3545;
            border-radius: 10px;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="verify-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold">🔍 Verify Certificate</h2>
        <p class="text-muted">Enter a certificate ID to verify its authenticity</p>
    </div>

    <form th:action="@{/verify}" method="get">
        <div class="input-group mb-4">
            <input type="text" name="certificateId" class="form-control form-control-lg"
                   placeholder="Enter Certificate ID">
            <button type="submit" class="btn btn-dark px-4">Verify</button>
        </div>
    </form>

    <div th:if="${certificate}" class="mt-3">
        <div th:if="${valid}" class="valid-badge text-center mb-3">
            <h4 class="text-success">✅ Certificate is VALID</h4>
        </div>
        <div th:unless="${valid}" class="invalid-badge text-center mb-3">
            <h4 class="text-danger">❌ Certificate has been REVOKED</h4>
        </div>

        <table class="table table-bordered mt-3">
            <tr>
                <td class="fw-semibold">Certificate ID</td>
                <td th:text="${certificate.certificateId}"></td>
            </tr>
            <tr>
                <td class="fw-semibold">Recipient Name</td>
                <td th:text="${certificate.recipientName}"></td>
            </tr>
            <tr>
                <td class="fw-semibold">Course</td>
                <td th:text="${certificate.courseTitle}"></td>
            </tr>
            <tr>
                <td class="fw-semibold">Enrollment No</td>
                <td th:text="${certificate.enrollmentNo}"></td>
            </tr>
            <tr>
                <td class="fw-semibold">Passing Year</td>
                <td th:text="${certificate.passingYear}"></td>
            </tr>
            <tr>
                <td class="fw-semibold">Issued By</td>
                <td th:text="${certificate.issuer.organizationName}"></td>
            </tr>
            <tr>
                <td class="fw-semibold">Issued On</td>
                <td th:text="${certificate.issuedAt}"></td>
            </tr>

            <tr>
                <td class="fw-semibold">Blockchain Verified</td>
                <td>
                    <span th:if="${chainValid}" class="badge bg-success">✅ Verified on Blockchain</span>
                    <span th:unless="${chainValid}" class="badge bg-warning">⚠ Not on Blockchain</span>
                </td>
            </tr>

        </table>
    </div>

    <div th:if="${error}" class="alert alert-danger text-center mt-3" th:text="${error}"></div>

    <p class="text-center mt-3">
        <a th:href="@{/login}" class="text-muted text-decoration-none">← Back to Login</a>
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
