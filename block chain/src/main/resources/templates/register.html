<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Certificate Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .register-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand-title {
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1.8rem;
        }
        .btn-primary {
            background: #1a1a2e;
            border: none;
            padding: 12px;
        }
    </style>
</head>
<body>
<div class="register-card">
    <div class="text-center mb-4">
        <h2 class="brand-title">🎓 CertifyMe</h2>
        <p class="text-muted">Register as Certificate Issuer</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" th:object="${registerRequest}">
        <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="Official email" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Create password" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Organization Name</label>
            <input type="text" th:field="*{organizationName}" class="form-control"
                   placeholder="University or Institute name" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Designation</label>
            <input type="text" th:field="*{designation}" class="form-control"
                   placeholder="e.g. Registrar, Principal" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill">Submit Registration Request</button>
    </form>

    <p class="text-center mt-3 text-muted">
        Already have an account?
        <a th:href="@{/login}" class="text-decoration-none fw-semibold">Login here</a>
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
