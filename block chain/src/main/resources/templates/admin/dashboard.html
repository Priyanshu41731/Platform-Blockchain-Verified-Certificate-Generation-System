<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar {
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            width: 250px;
        }
        .sidebar-brand {
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 10px 20px 30px;
            display: block;
        }
        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left: 4px solid #4cc9f0;
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .stat-card {
            border-radius: 15px;
            padding: 25px;
            color: white;
            border: none;
        }
        .badge-pending { background: #ffc107; color: #000; }
        .badge-approved { background: #28a745; }
        .badge-rejected { background: #dc3545; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <span class="sidebar-brand">🎓 CertifyMe</span>
    <a th:href="@{/admin/dashboard}" class="active">📊 Dashboard</a>
    <a th:href="@{/admin/certificates}">📜 All Certificates</a>
    <a th:href="@{/logout}">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Admin Dashboard</h4>
        <span class="text-muted">Welcome, Admin</span>
    </div>

    <!-- Stats Row -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card stat-card" style="background: linear-gradient(135deg, #4cc9f0, #4361ee);">
                <h6 class="mb-1">Total Issuers</h6>
                <h2 class="fw-bold" th:text="${issuers.size()}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card" style="background: linear-gradient(135deg, #f72585, #b5179e);">
                <h6 class="mb-1">Pending Approvals</h6>
                <h2 class="fw-bold" th:text="${pendingCount}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card" style="background: linear-gradient(135deg, #06d6a0, #118ab2);">
                <h6 class="mb-1">Approved Issuers</h6>
                <h2 class="fw-bold" th:text="${approvedCount}">0</h2>
            </div>
        </div>
    </div>

    <!-- Issuers Table -->
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-0 pt-4 pb-0">
            <h5 class="fw-bold">Issuer Requests</h5>
        </div>
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Organization</th>
                    <th>Designation</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="issuer, i : ${issuers}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${issuer.name}"></td>
                    <td th:text="${issuer.email}"></td>
                    <td th:text="${issuer.organizationName}"></td>
                    <td th:text="${issuer.designation}"></td>
                    <td>
                            <span th:class="'badge badge-' + ${issuer.status.name().toLowerCase()}"
                                  th:text="${issuer.status}"></span>
                    </td>
                    <td>
                        <form th:if="${issuer.status.name() == 'PENDING'}"
                              th:action="@{/admin/approve/{id}(id=${issuer.id})}"
                              method="post" style="display:inline">
                            <button class="btn btn-sm btn-success">Approve</button>
                        </form>
                        <form th:if="${issuer.status.name() == 'PENDING'}"
                              th:action="@{/admin/reject/{id}(id=${issuer.id})}"
                              method="post" style="display:inline">
                            <button class="btn btn-sm btn-danger ms-1">Reject</button>
                        </form>
                        <span th:if="${issuer.status.name() != 'PENDING'}"
                              class="text-muted small">No actions</span>
                    </td>
                </tr>
                <tr th:if="${issuers.empty}">
                    <td colspan="7" class="text-center text-muted py-4">No issuer requests yet</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
