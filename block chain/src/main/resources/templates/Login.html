<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Certificate Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand-title {
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1.8rem;
        }
        .btn-primary {
            background: #1a1a2e;
            border: none;
            padding: 12px;
            font-size: 1rem;
        }
        .btn-primary:hover {
            background: #16213e;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <h2 class="brand-title">🎓 CertifyMe</h2>
        <p class="text-muted">Digital Certificate Platform</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Invalid email or password. Please try again.
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        You have been logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="username" class="form-control form-control-lg"
                   placeholder="Enter your email" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill">Login</button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted mb-0">
        Want to issue certificates?
        <a th:href="@{/register}" class="text-decoration-none fw-semibold">Register as Issuer</a>
    </p>
    <p class="text-center mt-2">
        <a th:href="@{/verify}" class="text-muted text-decoration-none">🔍 Verify a Certificate</a>
    </p>
    <p class="text-center mt-2">
        <a th:href="@{/}" class="text-muted text-decoration-none">← Back to Home</a>
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
